<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Workout" />
<meta name="theme-color" content="#6f8ba5" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<title>Workout</title>
<style>
:root {
  --sky-top: #6f8ba5;
  --sky-mid: #8fa5bc;
  --sky-low: #b0bfcc;
  --sky-fade: #c9d2d9;
  --paper: #ece6d6;
  --paper-soft: #ded5bd;
  --ink: #14181a;
  --ink-mute: #4a5258;
  --ink-dim: #8a9198;
  --red: #b83a2e;
  --red-deep: #8c2a20;
  --blue: #3d5fa8;
  --yellow: #d4a029;
  --green: #3d6e3a;
  --green-deep: #2c5228;
  --purple: #8b6fad;
  --purple-deep: #6b4f8d;
  --sans: "Inter Tight", -apple-system, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --grain: url("data:image/svg+xml;utf8,<svg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.3' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: var(--sans);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
  color: var(--ink);
}
body {
  min-height: 100vh;
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-low) 80%, var(--sky-fade) 100%);
  background-attachment: fixed;
  padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: var(--grain);
  background-size: 220px 220px;
  opacity: 0.22;
  mix-blend-mode: multiply;
  pointer-events: none;
  z-index: 0;
}
input, button, select, textarea { font-family: inherit; color: inherit; background: transparent; border: none; outline: none; }
button { cursor: pointer; }
.app { max-width: 480px; margin: 0 auto; padding: env(safe-area-inset-top, 0px) 0 0; position: relative; z-index: 1; }
.label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
.field-paper {
  background: var(--paper); position: relative; padding: 16px; margin-bottom: 12px;
}
.field-paper::after {
  content: ''; position: absolute; inset: 0;
  background-image: var(--grain); background-size: 220px 220px;
  opacity: 0.15; mix-blend-mode: multiply; pointer-events: none;
}
.card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: relative; z-index: 1; }
.card-head .label { color: var(--ink-dim); }

/* Tab bar */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink);
  padding: 8px 0 calc(26px + env(safe-area-inset-bottom, 0px));
  display: flex; justify-content: space-around; z-index: 100;
}
.tabbar button {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 12px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
  color: var(--ink-dim); flex: 1; text-transform: uppercase; transition: color 0.15s;
}
.tabbar button .icon { font-size: 18px; line-height: 1; }
.tabbar button.active { color: var(--red); }

/* Screens */
.screen { padding: 0 16px 24px; display: none; }
.screen.active { display: block; }

/* Masthead */
.masthead { padding: 24px 0 16px; }
.masthead .label { color: rgba(255,255,255,0.7); }
.masthead h1 { margin: 6px 0 4px; font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.masthead .sub { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 1px; }

/* Week progress bar */
.week-progress { display: flex; gap: 4px; margin-bottom: 16px; }
.week-col { flex: 1; text-align: center; }
.week-col .wl { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 1px; margin-bottom: 3px; }
.week-col .wl.current { color: #fff; }
.week-col .wl.other { color: rgba(255,255,255,0.4); }
.week-bar { height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
.week-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

/* Session cards */
.day-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; background: rgba(20,24,26,0.06); cursor: pointer;
  transition: background 0.15s; position: relative; z-index: 1; margin-bottom: 6px;
}
.day-btn:hover { background: rgba(20,24,26,0.1); }
.day-btn .db-left { display: flex; flex-direction: column; gap: 2px; }
.day-btn .db-day { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; color: var(--ink-mute); }
.day-btn .db-label { font-size: 14px; font-weight: 600; color: var(--ink); }
.day-btn .db-sub { font-family: var(--mono); font-size: 9px; color: var(--ink-dim); }
.day-btn .db-status { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 8px; color: var(--ink-dim); }
.day-btn.is-done { background: var(--green-deep); }
.day-btn.is-done .db-day, .day-btn.is-done .db-label, .day-btn.is-done .db-sub { color: var(--paper); }
.day-btn.is-done .db-status { color: var(--paper); background: rgba(255,255,255,0.15); }
.day-btn.in-progress { background: var(--yellow); }
.day-btn.in-progress .db-status { color: var(--ink); }

/* Rules list */
.rules-list { position: relative; z-index: 1; }
.rule-row { display: flex; gap: 10px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid rgba(20,24,26,0.06); }
.rule-row:last-child { border-bottom: none; }
.rule-icon { font-size: 13px; width: 20px; text-align: center; flex-shrink: 0; }
.rule-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.rule-desc { font-size: 11px; color: var(--ink-dim); margin-left: 4px; }

/* Session banner */
.session-banner {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: rgba(20,24,26,0.08);
  margin-bottom: 12px; position: relative; z-index: 1;
}
.sb-week { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--ink-mute); }
.sb-rpe { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); }
.sb-rpe .cap-val { font-weight: 700; }
.sb-timer { font-family: var(--mono); font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.sb-timer.over-time { color: var(--yellow); }

/* View toggle */
.view-toggle {
  display: flex; gap: 4px; margin-bottom: 12px; position: relative; z-index: 1;
}
.view-toggle button {
  flex: 1; padding: 6px; font-family: var(--mono); font-size: 9px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--ink-dim);
  border: 1px solid rgba(20,24,26,0.12); transition: all 0.15s;
}
.view-toggle button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Exercise card (list mode) */
.ex-card {
  background: var(--paper); position: relative; margin-bottom: 10px; overflow: hidden;
}
.ex-card::after {
  content: ''; position: absolute; inset: 0;
  background-image: var(--grain); background-size: 220px 220px;
  opacity: 0.15; mix-blend-mode: multiply; pointer-events: none;
}
.ex-card-head { padding: 10px 12px; position: relative; z-index: 1; }
.ex-card.is-core { border-left: 3px solid var(--purple); }
.ex-card.is-core .ex-card-head { background: rgba(139,111,173,0.08); }
.core-badge { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--purple); background: rgba(139,111,173,0.12); padding: 2px 6px; text-transform: uppercase; }
.ex-card-name { font-size: 15px; font-weight: 700; text-transform: uppercase; color: var(--ink); }
.ex-card-cue { font-size: 11px; color: var(--ink-mute); margin-top: 2px; line-height: 1.4; }
.ex-card-suggestion { font-family: var(--mono); font-size: 10px; margin-top: 4px; letter-spacing: 0.5px; }
.suggestion-topped { color: var(--green-deep); }
.suggestion-hold { color: var(--ink-dim); }
.suggestion-start { color: var(--blue); }
.suggestion-calibrate { color: var(--purple); font-style: italic; }
.ex-card-pills { display: flex; gap: 6px; margin-top: 6px; }
.pill { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 6px; color: var(--ink-dim); background: rgba(20,24,26,0.06); }
.ex-card-body { padding: 8px 12px 10px; position: relative; z-index: 1; }

/* Set grid */
.set-grid-header {
  display: grid; gap: 6px; padding: 4px 0; position: relative; z-index: 1;
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  color: var(--ink-dim); text-transform: uppercase; font-weight: 700; text-align: center;
}
.set-grid-header.with-weight { grid-template-columns: 28px 1fr 1fr 1fr 36px; }
.set-grid-header.no-weight { grid-template-columns: 28px 1fr 1fr 36px; }
.set-row {
  display: grid; gap: 6px; padding: 6px 0; align-items: center;
  border-bottom: 1px solid rgba(20,24,26,0.06); position: relative; z-index: 1;
}
.set-row.with-weight { grid-template-columns: 28px 1fr 1fr 1fr 36px; }
.set-row.no-weight { grid-template-columns: 28px 1fr 1fr 36px; }
.set-row .sno { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--ink-mute); text-align: center; }
.set-row input[type="number"] {
  background: transparent; border: none; border-bottom: 2px solid rgba(20,24,26,0.15);
  padding: 5px 2px; font-size: 20px; font-weight: 600; text-align: center; width: 100%;
  font-family: var(--sans); color: var(--ink); -moz-appearance: textfield;
}
.set-row input[type="number"]::-webkit-outer-spin-button,
.set-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.set-row input:focus { border-bottom-color: var(--red); }
.set-row input::placeholder { color: var(--ink-dim); font-size: 12px; }
.set-row input.rpe-warn { border-bottom-color: var(--yellow); color: var(--yellow); }
.set-row input.rpe-over { border-bottom-color: var(--red); color: var(--red); }
.set-row .check {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--ink-dim); border: 2px solid rgba(20,24,26,0.15); transition: all 0.15s;
}
.set-row.done .check { background: var(--ink); border-color: var(--ink); color: var(--paper); }
.set-row.done input { color: var(--ink-dim); }
.rpe-warning {
  font-family: var(--mono); font-size: 10px; color: var(--yellow); letter-spacing: 0.5px;
  padding: 4px 8px; background: rgba(212,160,41,0.08); margin-top: 4px; position: relative; z-index: 1;
}

/* Mobility row */
.mobility-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: var(--paper); position: relative; margin-bottom: 8px; cursor: pointer;
}
.mobility-row::after {
  content: ''; position: absolute; inset: 0;
  background-image: var(--grain); background-size: 220px 220px;
  opacity: 0.15; mix-blend-mode: multiply; pointer-events: none;
}
.mobility-row.done { background: rgba(44,82,40,0.08); }
.mob-check {
  width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--ink-dim);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s; position: relative; z-index: 1;
}
.mobility-row.done .mob-check { background: var(--green-deep); border-color: var(--green-deep); color: #fff; }
.mob-info { position: relative; z-index: 1; }
.mob-name { font-size: 12px; color: var(--ink-mute); }
.mob-cue { font-family: var(--mono); font-size: 9px; color: var(--ink-dim); }

/* Core gate message */
.core-gate-msg {
  font-family: var(--mono); font-size: 10px; color: var(--purple); text-align: center;
  padding: 8px; background: rgba(139,111,173,0.08); margin-bottom: 8px;
  letter-spacing: 0.5px; position: relative; z-index: 1;
}

/* Finish button */
.finish-btn {
  width: 100%; padding: 14px; background: var(--ink); color: var(--paper);
  font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; text-align: center; position: relative; z-index: 1;
}
.finish-btn.disabled { opacity: 0.35; pointer-events: none; }

/* Focus mode */
#screen-focus { padding: 0; }
.focus-wrap { min-height: 100vh; background: var(--paper); position: relative; }
.focus-wrap::after { content: ''; position: absolute; inset: 0; background-image: var(--grain); background-size: 220px 220px; opacity: 0.15; mix-blend-mode: multiply; pointer-events: none; }
.focus-inner { position: relative; z-index: 1; padding: 0 16px 120px; }
.focus-top { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 12px; }
.focus-back { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--ink-mute); text-transform: uppercase; }
.focus-counter { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--ink-dim); letter-spacing: 1px; }
.progress-segments { display: flex; gap: 3px; margin-bottom: 16px; }
.progress-segments .seg { flex: 1; height: 4px; background: rgba(20,24,26,0.12); }
.progress-segments .seg.past { background: var(--ink); }
.progress-segments .seg.current { background: var(--red); }
.focus-hero { background: var(--red); padding: 20px 16px; margin: 0 -16px 16px; position: relative; }
.focus-hero::after { content: ''; position: absolute; inset: 0; background-image: var(--grain); background-size: 220px 220px; opacity: 0.15; mix-blend-mode: multiply; pointer-events: none; }
.focus-hero.is-core-hero { background: var(--purple-deep); }
.fh-inner { position: relative; z-index: 1; }
.fh-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; }
.fh-name { font-size: 32px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: -1px; line-height: 1.05; margin: 6px 0 12px; word-break: break-word; }
.fh-stats { display: flex; gap: 16px; }
.fh-stat-item { text-align: center; }
.fh-stat-val { font-size: 20px; font-weight: 700; color: #fff; }
.fh-stat-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
.focus-cue { font-size: 13px; color: var(--ink-mute); line-height: 1.5; margin-bottom: 16px; padding: 0 4px; }
.focus-add-set { width: 100%; padding: 10px; margin-top: 8px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--ink-mute); border: 2px dashed rgba(20,24,26,0.15); text-transform: uppercase; }
.focus-next-btn { width: 100%; padding: 14px; background: var(--ink); color: var(--paper); font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-top: 20px; }

/* Summary screen */
.summary-wrap { padding: 24px 0; }
.summary-emoji { font-size: 48px; text-align: center; margin-bottom: 8px; }
.summary-title { font-size: 20px; font-weight: 700; text-align: center; color: #fff; }
.summary-sub { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.6); text-align: center; margin-top: 4px; letter-spacing: 1px; }
.rules-check { position: relative; z-index: 1; }
.check-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(20,24,26,0.06); }
.check-row:last-child { border-bottom: none; }
.check-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.check-icon.pass { background: rgba(61,110,58,0.12); color: var(--green-deep); }
.check-icon.fail { background: rgba(184,58,46,0.12); color: var(--red); }
.check-label { font-size: 14px; font-weight: 500; }
.check-detail { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); margin-left: 6px; }

/* Deload prompt */
.deload-prompt {
  background: rgba(61,95,168,0.08); border: 1px solid rgba(61,95,168,0.2);
  padding: 16px; margin-bottom: 16px; position: relative; z-index: 1;
}
.deload-title { font-size: 15px; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
.deload-desc { font-size: 12px; color: var(--ink-mute); line-height: 1.5; margin-bottom: 12px; }
.deload-btns { display: flex; gap: 8px; }
.deload-btns button { flex: 1; padding: 10px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.deload-accept { background: var(--blue); color: #fff; }
.deload-dismiss { border: 1px solid rgba(20,24,26,0.15); color: var(--ink-dim); }

/* Advance button */
.advance-btn {
  width: 100%; padding: 12px; background: var(--red); color: #fff;
  font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; text-align: center; margin-top: 8px; position: relative; z-index: 1;
}

/* Rest timer */
.rest-timer {
  position: fixed;
  bottom: calc(60px + env(safe-area-inset-bottom, 0px) + 8px);
  left: 12px; right: 12px; max-width: 456px; margin: 0 auto;
  background: var(--ink); padding: 10px 14px;
  display: none; align-items: center; gap: 10px; z-index: 50;
}
.rest-timer.active { display: flex; }
.rt-time { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--red); min-width: 70px; font-variant-numeric: tabular-nums; }
.rt-label { flex: 1; font-family: var(--mono); font-size: 10px; color: var(--ink-dim); letter-spacing: 1px; }
.rt-btn { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--paper); padding: 6px 10px; background: rgba(255,255,255,0.1); }

/* Progress screen */
.progress-masthead { padding: 24px 0 16px; }
.progress-masthead .label { color: rgba(255,255,255,0.7); }
.progress-masthead h1 { font-size: 36px; font-weight: 700; color: #fff; margin: 4px 0 0; letter-spacing: -1px; }
.stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-card { background: var(--paper); padding: 14px 8px; text-align: center; position: relative; }
.stat-card::after { content: ''; position: absolute; inset: 0; background-image: var(--grain); background-size: 220px 220px; opacity: 0.15; mix-blend-mode: multiply; pointer-events: none; }
.sc-val { font-size: 24px; font-weight: 700; color: var(--ink); position: relative; z-index: 1; }
.sc-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; color: var(--ink-dim); text-transform: uppercase; margin-top: 2px; position: relative; z-index: 1; }

/* History log */
.history-item { padding: 12px; margin-bottom: 8px; position: relative; z-index: 1; }
.hi-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.hi-label { font-size: 14px; font-weight: 600; color: var(--ink); }
.hi-week { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--red); letter-spacing: 1px; }
.hi-date { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); }
.hi-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.hi-tag { font-family: var(--mono); font-size: 9px; color: var(--ink-dim); background: rgba(20,24,26,0.06); padding: 2px 6px; }

/* Settings */
.settings-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; position: relative; z-index: 1; margin-bottom: 12px; }
.sr-label { font-size: 14px; font-weight: 500; color: var(--ink); }
.sr-desc { font-family: var(--mono); font-size: 9px; color: var(--ink-dim); }
.settings-row select { background: rgba(20,24,26,0.06); padding: 8px 12px; font-size: 15px; color: var(--ink); min-width: 80px; text-align: center; font-family: var(--mono); }
.week-btns { display: flex; gap: 4px; }
.week-btns button {
  width: 36px; height: 36px; font-family: var(--mono); font-size: 13px; font-weight: 700;
  color: var(--ink-dim); border: 1px solid rgba(20,24,26,0.15); transition: all 0.15s;
}
.week-btns button.active { background: var(--red); color: #fff; border-color: var(--red); }
.data-btn {
  width: 100%; padding: 10px; font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--ink-mute);
  border: 1px solid rgba(20,24,26,0.15); margin-bottom: 8px; position: relative; z-index: 1;
}
.data-btn:hover { background: rgba(20,24,26,0.04); }
.data-btn.danger { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>
<div class="app">

  <!-- Screen: Home -->
  <div class="screen active" id="screen-home">
    <div class="masthead">
      <div class="label" id="home-label"></div>
      <h1 id="home-title"></h1>
      <div class="sub" id="home-sub"></div>

    <div class="week-progress" id="week-progress"></div>

  <!-- Screen: Summary -->
  <div class="screen" id="screen-summary">
    <div id="summary-content"></div>
  </div>

  <!-- Screen: Progress -->
  <div class="screen" id="screen-progress">
    <div class="progress-masthead">
      <div class="label">PROGRESS</div>
      <h1>BLOCK II</h1>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="sc-val" id="stat-sessions">0/18</div><div class="sc-lbl">Complete</div></div>
      <div class="stat-card"><div class="sc-val" id="stat-volume">0</div><div class="sc-lbl">Total LB</div></div>
      <div class="stat-card"><div class="sc-val" id="stat-avg-rpe">--</div><div class="sc-lbl">Avg RPE</div></div>
    </div>
    <div class="field-paper" id="history-card">
      <div class="card-head"><span class="label">HISTORY</span></div>
      <div id="history-list"></div>
    </div>
    <div class="field-paper">
      <div class="card-head"><span class="label">SETTINGS</span></div>
      <div class="settings-row">
        <div><div class="sr-label">Smith bar weight</div><div class="sr-desc">Used for plate math</div></div>
        <select id="smith-bar-weight">
          <option value="15">15 lb</option><option value="20">20 lb</option>
          <option value="25">25 lb</option><option value="35">35 lb</option><option value="45">45 lb</option>
        </select>
      </div>
      <div class="settings-row">
        <div><div class="sr-label">Current week</div><div class="sr-desc">Manual override</div></div>
        <div class="week-btns" id="week-btns"></div>
      </div>
    </div>
    <div class="field-paper">
      <div class="card-head"><span class="label">DATA</span></div>
      <button class="data-btn" id="btn-export">EXPORT JSON BACKUP</button>
      <button class="data-btn" id="btn-import">IMPORT FROM BACKUP</button>
      <input type="file" id="import-file" accept=".json" style="display:none;" />
      <button class="data-btn danger" id="btn-reset">RESET ALL DATA</button>
    </div>
  </div>

  <!-- Rest timer -->
  <div class="rest-timer" id="rest-timer">
    <div class="rt-time" id="rt-time">0:00</div>
    <div class="rt-label" id="rt-label">Resting...</div>
    <button class="rt-btn" id="rt-add">+30S</button>
    <button class="rt-btn" id="rt-stop">SKIP</button>
  </div>

  <!-- Tab bar -->
  <div class="tabbar">
    <button data-tab="home" class="active"><span class="icon">&#x25A6;</span><span>BLOCK</span></button>
    <button data-tab="session"><span class="icon">&#x25B6;</span><span>TODAY</span></button>
    <button data-tab="progress"><span class="icon">&#x2197;</span><span>PROGRESS</span></button>
  </div>

</div>

<script>
/* ================================================================
   Block 2: The Sustainable Cut
   Painted Field PWA
   ================================================================ */

const PROGRAM = {
  name: "Block 2: The Sustainable Cut",
  weeks: 6,
  rpeCap: {1:8,2:8,3:8,4:8,5:9,6:9},
  days: [
    {
      id: "d1", label: "Upper Push + Pull Accessory",
      exercises: [
        {name:"Warm-up: band pull-aparts + shoulder circles",type:"mobility",cue:"Scapular prep",defaultReps:"5 min"},
        {name:"Smith Bench Press",type:"weighted",unit:"lb",cue:"Controlled tempo. Hit 3x10 → add 5 lb, drop to 8s.",repRange:[8,10],startWeight:100,numSets:3},
        {name:"Smith OHP (seated)",type:"weighted",unit:"lb",cue:"Grip just outside shoulders. Drive head through at top.",repRange:[8,10],startWeight:70,numSets:3},
        {name:"Seated Cable Row (V-bar)",type:"weighted",unit:"lb",cue:"Squeeze shoulder blades 1 sec at contraction.",repRange:[10,12],startWeight:110,numSets:3},
        {name:"DB Lateral Raise",type:"weighted",unit:"lb",cue:"Slow eccentric. No momentum.",repRange:[12,15],startWeight:15,numSets:3},
        {name:"Cable Rope Tricep Pushdown",type:"weighted",unit:"lb",cue:"Full lockout at bottom. Elbows pinned.",repRange:[12,15],startWeight:35,numSets:3},
        {name:"Cable Crunch",type:"weighted",unit:"lb",cue:"Curl ribs to pelvis. Don't bow at hips.",repRange:[12,15],startWeight:null,numSets:3,isCore:true},
        {name:"Cool down: foam roll upper + lat stretch",type:"mobility",cue:"5-8 min",defaultReps:"5 min"},
      ],
    },
    {
      id: "d2", label: "Lower",
      exercises: [
        {name:"Warm-up: hip flexor stretch + glute bridges",type:"mobility",cue:"Hip opening + glute activation",defaultReps:"5 min"},
        {name:"Smith Squat",type:"weighted",unit:"lb",cue:"Depth to parallel. No rush.",repRange:[8,10],startWeight:125,numSets:3},
        {name:"DB Romanian Deadlift",type:"weighted",unit:"lb",cue:"Soft knees. Hinge, don't squat. DBs close to legs.",repRange:[10,12],startWeight:45,numSets:3},
        {name:"Bulgarian Split Squat",type:"weighted",unit:"lb",cue:"80% weight on front leg. Rear foot elevated.",repRange:[10,12],startWeight:25,numSets:3},
        {name:"Seated Leg Curl",type:"weighted",unit:"lb",cue:"Controlled. Pause at full contraction.",repRange:[10,12],startWeight:110,numSets:3},
        {name:"Standing Calf Raise (DBs)",type:"weighted",unit:"lb",cue:"Full range. Pause at stretch and contraction.",repRange:[15,20],startWeight:35,numSets:3},
        {name:"Hanging Knee Raise",type:"bodyweight",unit:"reps",cue:"Posterior pelvic tilt at top. No swinging.",repRange:[10,15],startWeight:null,numSets:3,isCore:true},
        {name:"Cool down: foam roll quads + hamstring stretch",type:"mobility",cue:"5-8 min",defaultReps:"5 min"},
      ],
    },
    {
      id: "d3", label: "Upper Pull + Push Accessory",
      exercises: [
        {name:"Warm-up: band pull-aparts + I-Y-T raises",type:"mobility",cue:"Scapular prep",defaultReps:"5 min"},
        {name:"Lat Pulldown (wide neutral)",type:"weighted",unit:"lb",cue:"Full stretch at top, drive elbows down.",repRange:[8,10],startWeight:110,numSets:3},
        {name:"Chest-Supported DB Row",type:"weighted",unit:"lb",cue:"Squeeze at top. No body English.",repRange:[10,12],startWeight:45,numSets:3},
        {name:"DB Incline Bench Press",type:"weighted",unit:"lb",cue:"30-45 degree incline. Controlled press.",repRange:[8,10],startWeight:45,numSets:3},
        {name:"Pull-ups (neutral or supinated)",type:"bodyweight",unit:"reps",cue:"Target 5-8 per set. Build reps before adding weight.",repRange:[5,8],startWeight:null,numSets:3,isAmrap:true},
        {name:"DB Hammer Curl",type:"weighted",unit:"lb",cue:"Full ROM. No momentum.",repRange:[10,12],startWeight:25,numSets:3},
        {name:"Pallof Press",type:"weighted",unit:"lb",cue:"Press + hold 2 sec at full extension. 10/side. Anti-rotation.",repRange:[10,10],startWeight:null,numSets:3,isCore:true},
        {name:"Cool down: foam roll + stretch",type:"mobility",cue:"5-8 min",defaultReps:"5 min"},
      ],
    },
  ],
};

const RULES = [
  {icon:"↑↑",title:"Double progression",desc:"Hit top of rep range all 3 sets → add 5 lb, drop to bottom"},
  {icon:"◎",title:"RPE ceiling",desc:""},
  {icon:"⏱",title:"50-60 min sessions",desc:"2 min rest compounds, 60-90 sec accessories"},
  {icon:"▣",title:"Core is not optional",desc:"Last exercise every day. 5 minutes. Do it."},
  {icon:"📅",title:"3x per week",desc:"Any 3 non-consecutive days. Bonus 4th = repeat weakest."},
  {icon:"↩",title:"Deload when needed",desc:"After W4 if beat up: same exercises, -20% weight, 1 week."},
];

const LS_KEY = 'workout-b2-data';

/* ---- State ---- */
let D = null; // app data
let activeSession = null;
let viewMode = 'focus'; // 'focus' or 'list'
let focusIdx = 0;
let elapsed = 0;
let timerInterval = null;
let restState = null;
let restInterval = null;

/* ---- Storage ---- */
function load() {
  try { D = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e) {}
  if (!D) D = {logs:{},prefs:{smithBarWeight:25},currentWeek:1,deloadDismissed:false,deloadAccepted:false,blockStarted:null};
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(D)); }

/* ---- Helpers ---- */
function sid(dayId, week) { return `${dayId}-w${week}`; }
function rpeCap(week) { return PROGRAM.rpeCap[week] || 8; }

function isSmith(name) { return /^smith\b/i.test(name); }
function isDB(name) { return /^db\b/i.test(name) || /\bholding dbs?\b|\bdbs?\b/i.test(name) || /bulgarian|split squat/i.test(name); }
function weightDetail(name, w) {
  if (!w) return '';
  if (isSmith(name)) {
    const bar = D.prefs.smithBarWeight || 25;
    const ps = Math.round(((w - bar) / 2) * 10) / 10;
    return ps > 0 ? `${ps} ea side + ${bar} bar` : `bar only (${bar} lb)`;
  }
  if (isDB(name)) return 'per DB';
  return '';
}

/* ---- Double Progression ---- */
function getSuggestion(dayId, exIdx, currentWeek) {
  const day = PROGRAM.days.find(d => d.id === dayId);
  const tmpl = day?.exercises[exIdx];
  if (!tmpl || tmpl.type === 'mobility' || tmpl.type === 'bodyweight') return null;

  // Deload week: find most recent weight and apply -20%
  if (D.deloadAccepted && currentWeek === 5) {
    for (let w = 4; w >= 1; w--) {
      const log = D.logs[sid(dayId, w)];
      if (!log?.finishedAt) continue;
      const exLog = log.exercises?.[exIdx];
      if (!exLog?.sets) continue;
      const doneSets = exLog.sets.filter(s => s.done && typeof s.reps === 'number' && s.reps > 0);
      if (doneSets.length === 0) continue;
      const w0 = doneSets[0].weight;
      if (w0) return {weight: Math.round(w0 * 0.8 / 5) * 5, reason: 'deload'};
    }
    // No prior data — fall through to start/calibrate below
  }

  // After deload (W6): skip W5 deload data, resume from W4 or earlier
  const skipDeload = D.deloadAccepted && currentWeek === 6;
  for (let w = currentWeek - 1; w >= 1; w--) {
    if (skipDeload && w === 5) continue; // don't progress from deload weights
    const s = sid(dayId, w);
    const log = D.logs[s];
    if (!log?.finishedAt) continue;
    const exLog = log.exercises?.[exIdx];
    if (!exLog?.sets) continue;
    const doneSets = exLog.sets.filter(s => s.done && typeof s.reps === 'number' && s.reps > 0);
    if (doneSets.length === 0) continue;
    const lastWeight = doneSets[0].weight || tmpl.startWeight;
    if (!lastWeight) continue;
    const allHitTop = doneSets.length >= (tmpl.numSets||3) && doneSets.every(s => s.reps >= tmpl.repRange[1]);
    if (allHitTop) return {weight: lastWeight + 5, reason: 'topped'};
    return {weight: lastWeight, reason: 'hold'};
  }
  if (tmpl.startWeight === null) return {weight: null, reason: 'calibrate'};
  return tmpl.startWeight ? {weight: tmpl.startWeight, reason: 'start'} : null;
}

/* ---- Session init ---- */
function initSession(dayId, week) {
  const s = sid(dayId, week);
  if (D.logs[s]) return D.logs[s];
  const day = PROGRAM.days.find(d => d.id === dayId);
  const exercises = day.exercises.map((ex, i) => {
    if (ex.type === 'mobility') return {sets:[{reps:ex.defaultReps,weight:null,rpe:null,done:false}]};
    const n = ex.numSets || 3;
    const sug = getSuggestion(dayId, i, week);
    const w = sug?.weight ?? ex.startWeight ?? null;
    return {sets: Array.from({length:n}, () => ({reps:null,weight:w,rpe:null,done:false}))};
  });
  const log = {sessionId:s, date:new Date().toISOString().split('T')[0], dayId, week, label:day.label, exercises, startedAt:new Date().toISOString(), finishedAt:null};
  D.logs[s] = log;
  if (!D.blockStarted) D.blockStarted = new Date().toISOString();
  save();
  return log;
}

/* ---- Core gate check ---- */
function coreComplete(log, dayDef) {
  return dayDef.exercises.every((ex, i) => {
    if (!ex.isCore) return true;
    const el = log.exercises?.[i];
    return el?.sets?.some(s => s.done && typeof s.reps === 'number' && s.reps > 0);
  });
}

/* ---- Session volume ---- */
function sessionVol(log) {
  let v = 0;
  if (!log?.exercises) return 0;
  for (const ex of log.exercises) {
    for (const s of ex.sets) {
      if (!s.done) continue;
      const r = parseInt(s.reps); const w = parseFloat(s.weight);
      if (!isNaN(r) && !isNaN(w)) v += r * w;
    }
  }
  return Math.round(v);
}

/* ---- Audio ---- */
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [660,880,1100].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.3, ctx.currentTime + i*0.15);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.25);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i*0.15); o.stop(ctx.currentTime + i*0.15 + 0.25);
    });
    setTimeout(() => ctx.close(), 2000);
  } catch(e) {}
}

/* ---- Rest timer ---- */
function startRest(sec, name) {
  stopRest();
  restState = {endTs: Date.now() + sec*1000, label: 'Rest · ' + name};
  tickRest();
  restInterval = setInterval(tickRest, 500);
}
function stopRest() {
  clearInterval(restInterval); restState = null;
  document.getElementById('rest-timer').classList.remove('active');
}
function tickRest() {
  if (!restState) return;
  const remain = Math.ceil((restState.endTs - Date.now()) / 1000);
  const el = document.getElementById('rest-timer');
  el.classList.add('active');
  const m = Math.floor(Math.max(0,remain)/60), s = Math.max(0,remain)%60;
  document.getElementById('rt-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('rt-label').textContent = restState.label;
  if (remain <= 0) {
    document.getElementById('rt-time').textContent = '0:00';
    document.getElementById('rt-label').textContent = 'Rest done. Go.';
    if (navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
    playBeep();
    setTimeout(stopRest, 3000);
    clearInterval(restInterval);
  }
}

/* ---- Session timer ---- */
function startSessionTimer(startedAt) {
  clearInterval(timerInterval);
  const start = new Date(startedAt).getTime();
  const tick = () => { elapsed = Math.floor((Date.now() - start) / 1000); updateBannerTimer(); };
  tick();
  timerInterval = setInterval(tick, 1000);
}
function stopSessionTimer() { clearInterval(timerInterval); }
function updateBannerTimer() {
  const el = document.getElementById('sb-timer');
  if (!el) return;
  const m = Math.floor(elapsed/60), s = elapsed%60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.className = 'sb-timer' + (m >= 60 ? ' over-time' : '');
}

/* ================================================================
   RENDERING
   ================================================================ */

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (['home','session','progress'].includes(name)) {
    const tabMap = {home:'home',session:'session',progress:'progress'};
    document.querySelectorAll('.tabbar button').forEach(b => b.classList.toggle('active', b.dataset.tab === tabMap[name]));
  }
}

/* ---- Home ---- */
function renderHome() {
  const week = D.currentWeek;
  const cap = rpeCap(week);

  document.getElementById('home-label').textContent = `BLOCK II · WEEK ${week} OF 6`;
  document.getElementById('home-title').textContent = PROGRAM.name.toUpperCase();
  document.getElementById('home-sub').textContent = `3 DAYS / WEEK · 3 SETS · RPE ≤${cap}`;

  // Week progress
  const wp = document.getElementById('week-progress');
  let wpHtml = '';
  for (let w = 1; w <= 6; w++) {
    const done = PROGRAM.days.filter(d => D.logs[sid(d.id,w)]?.finishedAt).length;
    const pct = Math.round((done/3)*100);
    const isCur = w === week;
    let color = 'rgba(255,255,255,0.3)';
    if (done >= 3) color = '#fff';
    else if (isCur) color = 'var(--red)';
    wpHtml += `<div class="week-col">
      <div class="wl ${isCur?'current':'other'}">W${w}</div>
      <div class="week-bar"><div class="week-bar-fill" style="width:${pct}%;background:${color};"></div></div>
    </div>`;
  }
  wp.innerHTML = wpHtml;

  // Deload prompt
  const dHost = document.getElementById('deload-host');
  const w4done = PROGRAM.days.filter(d => D.logs[sid(d.id,4)]?.finishedAt).length;
  if (week >= 4 && w4done >= 3 && !D.deloadDismissed) {
    dHost.innerHTML = `<div class="deload-prompt">
      <div class="deload-title">Week 4 done. How are you feeling?</div>
      <div class="deload-desc">If you're beat up, take a deload: same exercises, drop all weights 20% for W5. One easy week, then resume at your pre-deload weights for W6.</div>
      <div class="deload-btns">
        <button class="deload-accept" id="deload-accept">TAKE THE DELOAD</button>
        <button class="deload-dismiss" id="deload-dismiss">I'M GOOD</button>
      </div>
    </div>`;
    document.getElementById('deload-accept').addEventListener('click', () => {
      D.deloadDismissed = true; D.deloadAccepted = true; save(); renderHome();
    });
    document.getElementById('deload-dismiss').addEventListener('click', () => {
      D.deloadDismissed = true; D.deloadAccepted = false; save(); renderHome();
    });
  } else {
    dHost.innerHTML = '';
  }

  // Session cards
  const sc = document.getElementById('sessions-card');
  const completed = PROGRAM.days.filter(d => D.logs[sid(d.id,week)]?.finishedAt).length;
  let scHtml = `<div class="card-head"><span class="label">WEEK ${week} · ${completed}/3 SESSIONS</span></div>`;
  PROGRAM.days.forEach((day, i) => {
    const s = sid(day.id, week);
    const log = D.logs[s];
    const finished = !!log?.finishedAt;
    const inProg = log && !finished;
    let cls = '', status = '→';
    if (finished) { cls = 'is-done'; status = 'DONE'; }
    else if (inProg) { cls = 'in-progress'; status = 'IN PROGRESS'; }
    const exCount = day.exercises.filter(e => e.type !== 'mobility').length;
    scHtml += `<div class="day-btn ${cls}" data-day="${i}">
      <div class="db-left">
        <div class="db-day">DAY ${i+1}</div>
        <div class="db-label">${day.label}</div>
        <div class="db-sub">${exCount} exercises</div>
      </div>
      <div class="db-status">${status}</div>
    </div>`;
  });
  if (completed > 0 && week < 6) {
    scHtml += `<button class="advance-btn" id="btn-advance">ADVANCE TO WEEK ${week+1}</button>`;
  }
  sc.innerHTML = scHtml;
  sc.querySelectorAll('.day-btn').forEach(b => {
    b.addEventListener('click', () => openSession(parseInt(b.dataset.day)));
  });
  const advBtn = document.getElementById('btn-advance');
  if (advBtn) advBtn.addEventListener('click', () => { D.currentWeek++; save(); renderHome(); });

  // Rules
  const rl = document.getElementById('rules-list');
  rl.innerHTML = RULES.map(r => {
    const desc = r.title === 'RPE ceiling' ? `≤${cap} this week (W${week})` : r.desc;
    return `<div class="rule-row">
      <div class="rule-icon">${r.icon}</div>
      <div><span class="rule-title">${r.title}</span><span class="rule-desc">${desc}</span></div>
    </div>`;
  }).join('');
}

/* ---- Open session ---- */
function openSession(dayIdx) {
  const day = PROGRAM.days[dayIdx];
  const week = D.currentWeek;
  const log = initSession(day.id, week);
  activeSession = log.sessionId;
  focusIdx = 0;
  startSessionTimer(log.startedAt);

  // Find first incomplete work exercise
  const dayDef = day;
  for (let i = 0; i < dayDef.exercises.length; i++) {
    if (dayDef.exercises[i].type === 'mobility') continue;
    const allDone = log.exercises[i]?.sets?.every(s => s.done);
    if (!allDone) { focusIdx = i; break; }
  }

  if (viewMode === 'focus') {
    showScreen('focus');
    renderFocus();
  } else {
    showScreen('session');
    renderSession();
  }
}

/* ---- Session banner ---- */
function renderBanner(log) {
  const cap = rpeCap(log.week);
  const banner = document.getElementById('session-banner');
  banner.innerHTML = `
    <span class="sb-week">W${log.week}/6</span>
    <span class="sb-rpe">RPE cap: <span class="cap-val" style="color:${cap<=8?'var(--green-deep)':'var(--yellow)'}">${cap}</span></span>
    <span class="sb-timer" id="sb-timer">0:00</span>
  `;
}

/* ---- Session (list mode) ---- */
function renderSession() {
  if (!activeSession) return;
  const [dayId, wpart] = activeSession.split('-w');
  const week = parseInt(wpart);
  const log = D.logs[activeSession];
  if (!log) return;
  const dayDef = PROGRAM.days.find(d => d.id === dayId);
  const cap = rpeCap(week);

  // Top
  document.getElementById('session-top').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 0 8px;position:relative;z-index:1;">
      <button style="font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.6);text-transform:uppercase;" id="session-back">← BACK</button>
      <span style="font-size:15px;font-weight:700;color:#fff;">${log.label}</span>
      <span style="width:40px;"></span>
    </div>
  `;
  document.getElementById('session-back').addEventListener('click', () => { stopSessionTimer(); showScreen('home'); renderHome(); });

  renderBanner(log);

  // Toggle
  document.querySelectorAll('#view-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === viewMode);
    b.onclick = () => {
      viewMode = b.dataset.mode;
      if (viewMode === 'focus') { showScreen('focus'); renderFocus(); }
      else { renderSession(); }
    };
  });

  // Exercise list
  const host = document.getElementById('session-list-content');
  host.innerHTML = '';
  dayDef.exercises.forEach((ex, i) => {
    const exLog = log.exercises[i];
    if (ex.type === 'mobility') {
      const done = exLog.sets[0]?.done;
      const row = document.createElement('div');
      row.className = `mobility-row${done?' done':''}`;
      row.innerHTML = `<div class="mob-check" style="position:relative;z-index:1;">${done?'✓':''}</div>
        <div class="mob-info"><div class="mob-name">${ex.name}</div><div class="mob-cue">${ex.cue}</div></div>`;
      row.addEventListener('click', () => { exLog.sets[0].done = !done; save(); renderSession(); });
      host.appendChild(row);
      return;
    }
    const sug = getSuggestion(dayId, i, week);
    const card = document.createElement('div');
    card.className = `ex-card${ex.isCore?' is-core':''}`;
    let headHtml = `<div class="ex-card-head">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span class="ex-card-name">${ex.name}</span>
        ${ex.isCore?'<span class="core-badge">CORE</span>':''}
      </div>
      <div class="ex-card-cue">${ex.cue}</div>`;
    if (sug) {
      let sugCls = 'suggestion-' + sug.reason;
      let sugText = '';
      if (sug.reason === 'topped') sugText = `→ ${sug.weight} lb (earned +5)`;
      else if (sug.reason === 'hold') sugText = `Hold: ${sug.weight} lb`;
      else if (sug.reason === 'start') sugText = `Start: ${sug.weight} lb`;
      else if (sug.reason === 'calibrate') sugText = 'Calibration week — find your weight';
      else if (sug.reason === 'deload') sugText = `Deload: ${sug.weight} lb (-20%)`;
      headHtml += `<div class="ex-card-suggestion ${sugCls}">${sugText}</div>`;
    }
    headHtml += `<div class="ex-card-pills">
      <span class="pill">${ex.isAmrap?'AMRAP':`${ex.repRange[0]}-${ex.repRange[1]}`}</span>
      <span class="pill">${ex.numSets} SETS</span>
    </div></div>`;

    const hasWeight = ex.type === 'weighted';
    let bodyHtml = `<div class="ex-card-body">
      <div class="set-grid-header ${hasWeight?'with-weight':'no-weight'}">
        <div>#</div>${hasWeight?'<div>LB</div>':''}<div>REPS</div><div>RPE</div><div></div>
      </div>`;
    exLog.sets.forEach((s, si) => {
      const rpeOver = s.rpe && s.rpe > cap;
      const rpeWarn = s.rpe && s.rpe >= cap;
      const wVal = s.weight != null ? s.weight : '';
      const rpeVal = s.rpe != null ? s.rpe : '';
      const repsVal = typeof s.reps === 'number' ? s.reps : '';
      const repsPlc = ex.repRange ? ex.repRange[0] + '-' + ex.repRange[1] : 'reps';
      const wPlc = sug && sug.weight ? sug.weight : 'lb';
      const rpeCls = rpeOver ? 'rpe-over' : rpeWarn ? 'rpe-warn' : '';
      let weightCell = '';
      if (hasWeight) {
        weightCell = '<input type="number" inputmode="decimal" value="' + wVal + '" data-field="weight" placeholder="' + wPlc + '">';
      }
      bodyHtml += '<div class="set-row ' + (s.done ? 'done' : '') + ' ' + (hasWeight ? 'with-weight' : 'no-weight') + '" data-ex="' + i + '" data-set="' + si + '">'
        + '<div class="sno">' + (si+1) + '</div>'
        + weightCell
        + '<input type="number" inputmode="numeric" value="' + repsVal + '" data-field="reps" placeholder="' + repsPlc + '">'
        + '<input type="number" inputmode="numeric" value="' + rpeVal + '" data-field="rpe" placeholder="—" class="' + rpeCls + '">'
        + '<button class="check" data-act="toggle">' + (s.done ? '✓' : '') + '</button>'
        + '</div>';
    });
    // RPE warning
    const hasRpeOver = exLog.sets.some(s => s.done && s.rpe > cap);
    if (hasRpeOver) bodyHtml += `<div class="rpe-warning">RPE cap is ${cap} this week. Consider dropping 5 lb next set.</div>`;
    bodyHtml += '</div>';

    card.innerHTML = headHtml + bodyHtml;
    host.appendChild(card);

    // Wire inputs
    card.querySelectorAll('.set-row').forEach(row => {
      const si = parseInt(row.dataset.set);
      const s = exLog.sets[si];
      row.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('change', () => {
          const f = inp.dataset.field;
          const v = inp.value.trim();
          if (f === 'reps') s.reps = v === '' ? null : parseInt(v);
          else if (f === 'weight') s.weight = v === '' ? null : parseFloat(v);
          else if (f === 'rpe') { s.rpe = v === '' ? null : parseFloat(v); renderSession(); }
          save();
        });
      });
      row.querySelector('[data-act="toggle"]').addEventListener('click', () => {
        s.done = !s.done;
        if (s.done) {
          s.completedAt = new Date().toISOString();
          const restSec = i <= 2 ? 120 : 75;
          startRest(restSec, ex.name);
        }
        save(); renderSession();
      });
    });
  });

  // Core gate
  const gate = document.getElementById('core-gate');
  const cc = coreComplete(log, dayDef);
  const anyDone = log.exercises.some(el => el?.sets?.some(s => s.done));
  if (anyDone && !cc) {
    gate.innerHTML = '<div class="core-gate-msg">Complete the core finisher to finish session</div>';
  } else { gate.innerHTML = ''; }

  // Finish button
  const finBtn = document.getElementById('btn-finish');
  finBtn.className = 'finish-btn' + (!cc ? ' disabled' : '');
  finBtn.textContent = 'FINISH SESSION →';
  finBtn.onclick = () => {
    if (!cc) return;
    log.finishedAt = new Date().toISOString();
    save(); stopSessionTimer();
    showScreen('summary'); renderSummary(log, dayDef);
  };
}

/* ---- Focus mode ---- */
function renderFocus() {
  if (!activeSession) return;
  const [dayId, wpart] = activeSession.split('-w');
  const week = parseInt(wpart);
  const log = D.logs[activeSession];
  if (!log) return;
  const dayDef = PROGRAM.days.find(d => d.id === dayId);
  const cap = rpeCap(week);
  const ex = dayDef.exercises[focusIdx];
  const exLog = log.exercises[focusIdx];
  if (!ex || !exLog) return;

  const workExercises = dayDef.exercises.map((e,i) => ({ex:e,i})).filter(x => x.ex.type !== 'mobility');
  const workIdx = workExercises.findIndex(x => x.i === focusIdx);
  const totalWork = workExercises.length;

  // Handle mobility - skip to next
  if (ex.type === 'mobility') {
    const next = workExercises.find(x => x.i > focusIdx);
    if (next) { focusIdx = next.i; renderFocus(); return; }
  }

  const inner = document.getElementById('focus-inner');
  let html = '';

  // Top bar
  html += `<div class="focus-top">
    <button class="focus-back" id="focus-back-btn">← BACK</button>
    <div style="display:flex;align-items:center;gap:12px;">
      ${workIdx > 0 ? '<button class="focus-back" id="focus-prev-btn">← PREV</button>' : ''}
      <div class="focus-counter">${String(workIdx+1).padStart(2,'0')} / ${String(totalWork).padStart(2,'0')}</div>
    </div>
  </div>`;

  // Banner
  html += `<div class="session-banner" style="margin:0 -16px 12px;padding:8px 28px;">
    <span class="sb-week">W${week}/6</span>
    <span class="sb-rpe">RPE cap: <span class="cap-val" style="color:${cap<=8?'var(--green-deep)':'var(--yellow)'}">${cap}</span></span>
    <span class="sb-timer" id="sb-timer">0:00</span>
  </div>`;

  // Segments
  html += '<div class="progress-segments">';
  workExercises.forEach((we, wi) => {
    let cls = 'seg';
    if (wi < workIdx) cls += ' past';
    else if (wi === workIdx) cls += ' current';
    html += `<div class="${cls}"></div>`;
  });
  html += '</div>';

  // Hero
  const sug = getSuggestion(dayId, focusIdx, week);
  const setsDone = exLog.sets.filter(s => s.done).length;
  const firstSet = exLog.sets[0];
  const heroClass = ex.isCore ? 'focus-hero is-core-hero' : 'focus-hero';
  html += `<div class="${heroClass}"><div class="fh-inner">
    <div class="fh-label">EX ${String(workIdx+1).padStart(2,'0')}${ex.isCore?' · CORE':''}${ex.isAmrap?' · AMRAP':''}</div>
    <div class="fh-name">${ex.name}</div>
    <div class="fh-stats">
      <div class="fh-stat-item"><div class="fh-stat-val">${exLog.sets.length}</div><div class="fh-stat-lbl">SETS</div></div>
      <div class="fh-stat-item"><div class="fh-stat-val">${ex.repRange?ex.repRange[0]+'-'+ex.repRange[1]:'—'}</div><div class="fh-stat-lbl">REPS</div></div>
      <div class="fh-stat-item"><div class="fh-stat-val">${firstSet.weight||'BW'}</div><div class="fh-stat-lbl">WEIGHT</div></div>
      <div class="fh-stat-item"><div class="fh-stat-val">${setsDone}</div><div class="fh-stat-lbl">DONE</div></div>
    </div>
  </div></div>`;

  // Cue
  if (ex.cue) html += `<div class="focus-cue">${ex.cue}</div>`;

  // Suggestion
  if (sug) {
    let sugText = '', sugCls = '';
    if (sug.reason === 'topped') { sugText = `→ ${sug.weight} lb (earned +5)`; sugCls = 'suggestion-topped'; }
    else if (sug.reason === 'hold') { sugText = `Hold: ${sug.weight} lb`; sugCls = 'suggestion-hold'; }
    else if (sug.reason === 'start') { sugText = `Start: ${sug.weight} lb`; sugCls = 'suggestion-start'; }
    else if (sug.reason === 'calibrate') { sugText = 'Calibration week — find your weight'; sugCls = 'suggestion-calibrate'; }
    else if (sug.reason === 'deload') { sugText = `Deload: ${sug.weight} lb (-20%)`; sugCls = 'suggestion-start'; }
    html += `<div style="font-family:var(--mono);font-size:11px;letter-spacing:0.5px;margin-bottom:12px;padding:6px 8px;background:rgba(20,24,26,0.04);" class="${sugCls}">${sugText}</div>`;
  }

  // Weight detail
  if (firstSet.weight && (isSmith(ex.name) || isDB(ex.name))) {
    html += `<div style="font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-bottom:12px;letter-spacing:0.5px;">${weightDetail(ex.name, firstSet.weight)}</div>`;
  }

  // Set grid
  const hasWeight = ex.type === 'weighted';
  html += `<div class="set-grid-header ${hasWeight?'with-weight':'no-weight'}">
    <div>#</div>${hasWeight?'<div>LB</div>':''}<div>REPS</div><div>RPE</div><div></div>
  </div>`;
  exLog.sets.forEach((s, si) => {
    const rpeOver = s.rpe && s.rpe > cap;
    const rpeWarn = s.rpe && s.rpe >= cap;
    const wVal = s.weight != null ? s.weight : '';
    const rpeVal = s.rpe != null ? s.rpe : '';
    const repsVal = typeof s.reps === 'number' ? s.reps : '';
    const repsPlc = ex.repRange ? ex.repRange[0] + '-' + ex.repRange[1] : 'reps';
    const wPlc = sug && sug.weight ? sug.weight : 'lb';
    const rpeCls = rpeOver ? 'rpe-over' : rpeWarn ? 'rpe-warn' : '';
    let weightCell = '';
    if (hasWeight) {
      weightCell = '<input type="number" inputmode="decimal" value="' + wVal + '" data-field="weight" placeholder="' + wPlc + '">';
    }
    html += '<div class="set-row ' + (s.done ? 'done' : '') + ' ' + (hasWeight ? 'with-weight' : 'no-weight') + '" data-sidx="' + si + '">'
      + '<div class="sno">' + (si+1) + '</div>'
      + weightCell
      + '<input type="number" inputmode="numeric" value="' + repsVal + '" data-field="reps" placeholder="' + repsPlc + '">'
      + '<input type="number" inputmode="numeric" value="' + rpeVal + '" data-field="rpe" placeholder="—" class="' + rpeCls + '">'
      + '<button class="check" data-act="toggle">' + (s.done ? '✓' : '') + '</button>'
      + '</div>';
  });

  // RPE warning
  if (exLog.sets.some(s => s.done && s.rpe > cap)) {
    html += `<div class="rpe-warning">RPE cap is ${cap} this week. Consider dropping 5 lb next set.</div>`;
  }

  // Add set
  html += `<button class="focus-add-set" id="focus-add-set">+ ADD SET</button>`;

  // Next / finish
  const nextWorkIdx = workIdx + 1;
  if (nextWorkIdx < totalWork) {
    html += `<button class="focus-next-btn" id="focus-next-btn">NEXT: ${workExercises[nextWorkIdx].ex.name.toUpperCase()}</button>`;
  } else {
    const cc = coreComplete(log, dayDef);
    html += `<button class="focus-next-btn${cc?'':' disabled'}" id="focus-next-btn" style="${cc?'':'opacity:0.35;pointer-events:none;'}">${cc?'FINISH SESSION':'COMPLETE CORE FIRST'}</button>`;
  }

  inner.innerHTML = html;

  // Wire events
  document.getElementById('focus-back-btn').addEventListener('click', () => {
    if (viewMode === 'list') { showScreen('session'); renderSession(); }
    else { stopSessionTimer(); showScreen('home'); renderHome(); }
  });
  const prevBtn = document.getElementById('focus-prev-btn');
  if (prevBtn) prevBtn.addEventListener('click', () => {
    if (workIdx > 0) { focusIdx = workExercises[workIdx-1].i; renderFocus(); }
  });

  inner.querySelectorAll('.set-row').forEach(row => {
    const si = parseInt(row.dataset.sidx);
    const s = exLog.sets[si];
    row.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('change', () => {
        const f = inp.dataset.field;
        const v = inp.value.trim();
        if (f === 'reps') s.reps = v === '' ? null : parseInt(v);
        else if (f === 'weight') s.weight = v === '' ? null : parseFloat(v);
        else if (f === 'rpe') s.rpe = v === '' ? null : parseFloat(v);
        save();
      });
    });
    row.querySelector('[data-act="toggle"]').addEventListener('click', () => {
      s.done = !s.done;
      if (s.done) {
        s.completedAt = new Date().toISOString();
        const restSec = focusIdx <= 2 ? 120 : 75;
        startRest(restSec, ex.name);
      }
      save(); renderFocus();
    });
  });

  document.getElementById('focus-add-set').addEventListener('click', () => {
    const last = exLog.sets[exLog.sets.length-1];
    exLog.sets.push({reps:null, weight:last?last.weight:null, rpe:null, done:false});
    save(); renderFocus();
  });

  document.getElementById('focus-next-btn').addEventListener('click', () => {
    if (nextWorkIdx < totalWork) {
      focusIdx = workExercises[nextWorkIdx].i;
      renderFocus();
    } else {
      if (!coreComplete(log, dayDef)) return;
      log.finishedAt = new Date().toISOString();
      save(); stopSessionTimer();
      showScreen('summary'); renderSummary(log, dayDef);
    }
  });

  // Update timer display
  updateBannerTimer();
}

/* ---- Summary ---- */
function renderSummary(log, dayDef) {
  const cap = rpeCap(log.week);
  const cc = coreComplete(log, dayDef);

  let maxRpe = 0;
  log.exercises.forEach((el, i) => {
    if (dayDef.exercises[i]?.type === 'mobility') return;
    el?.sets?.forEach(s => { if (s.rpe && s.rpe > maxRpe) maxRpe = s.rpe; });
  });
  const rpeOk = maxRpe <= cap;

  const start = log.startedAt ? new Date(log.startedAt) : null;
  const end = log.finishedAt ? new Date(log.finishedAt) : null;
  const durMin = start && end ? Math.round((end - start) / 60000) : null;
  const timeOk = durMin !== null && durMin <= 65;

  const allPass = cc && rpeOk && timeOk;

  const checks = [
    {label:'Core finisher completed', pass:cc},
    {label:`RPE stayed ≤ ${cap}`, pass:rpeOk, detail:!rpeOk?`Peak: ${maxRpe}`:null},
    {label:'Session under 60 min', pass:timeOk, detail:durMin!==null?`${durMin} min`:'no data'},
  ];

  const vol = sessionVol(log);

  const content = document.getElementById('summary-content');
  content.innerHTML = `
    <div class="summary-wrap">
      <div class="summary-emoji">${allPass?'💪':'📋'}</div>
      <div class="summary-title">Session Complete</div>
      <div class="summary-sub">${log.label} · W${log.week}${durMin?' · '+durMin+' min':''}</div>
      <div style="height:20px;"></div>
      <div class="field-paper">
        <div class="card-head"><span class="label">RULES CHECK</span></div>
        <div class="rules-check">
          ${checks.map(c => `<div class="check-row">
            <div class="check-icon ${c.pass?'pass':'fail'}">${c.pass?'✓':'✗'}</div>
            <div>
              <span class="check-label" style="color:${c.pass?'var(--ink)':'var(--red)'}">${c.label}</span>
              ${c.detail?`<span class="check-detail">(${c.detail})</span>`:''}
            </div>
          </div>`).join('')}
        </div>
      </div>
      <div class="field-paper">
        <div class="card-head"><span class="label">VOLUME</span></div>
        <div style="font-size:36px;font-weight:200;color:var(--ink);position:relative;z-index:1;">${vol.toLocaleString()} <span style="font-size:14px;color:var(--ink-dim);">lb</span></div>
      </div>
      <button class="finish-btn" id="summary-done">DONE</button>
    </div>
  `;

  document.getElementById('summary-done').addEventListener('click', () => {
    activeSession = null;
    showScreen('home'); renderHome();
  });
}

/* ---- Progress ---- */
function renderProgress() {
  const allLogs = Object.values(D.logs).filter(l => l.finishedAt);
  const completed = allLogs.length;
  let totalVol = 0, rpeSum = 0, rpeCount = 0;
  for (const l of allLogs) {
    totalVol += sessionVol(l);
    for (const ex of l.exercises) {
      for (const s of ex.sets) {
        if (!s.done || !s.rpe) continue;
        rpeSum += s.rpe; rpeCount++;
      }
    }
  }
  document.getElementById('stat-sessions').textContent = `${completed}/18`;
  document.getElementById('stat-volume').textContent = totalVol > 0 ? (totalVol/1000).toFixed(1) + 'k' : '0';
  document.getElementById('stat-avg-rpe').textContent = rpeCount > 0 ? (rpeSum/rpeCount).toFixed(1) : '--';

  // History
  const sorted = allLogs.sort((a,b) => b.date.localeCompare(a.date));
  const hist = document.getElementById('history-list');
  if (sorted.length === 0) {
    hist.innerHTML = '<div style="font-size:12px;color:var(--ink-dim);position:relative;z-index:1;">No completed sessions yet.</div>';
  } else {
    hist.innerHTML = sorted.map(log => {
      const tags = log.exercises.map((el,i) => {
        const done = el?.sets?.filter(s => s.done && typeof s.reps === 'number' && s.reps > 0);
        if (!done || done.length === 0) return '';
        const w = done[0]?.weight;
        return `<span class="hi-tag">${w?w+'lb':'BW'} × ${done.map(s=>s.reps).join('/')}</span>`;
      }).filter(Boolean).join('');
      return `<div class="field-paper history-item">
        <div class="hi-top"><span class="hi-label">${log.label}</span><span class="hi-week">W${log.week}</span></div>
        <div class="hi-date">${log.date}</div>
        <div class="hi-tags">${tags}</div>
      </div>`;
    }).join('');
  }

  // Smith bar
  const barSel = document.getElementById('smith-bar-weight');
  barSel.value = D.prefs.smithBarWeight || 25;

  // Week buttons
  const wb = document.getElementById('week-btns');
  wb.innerHTML = '';
  for (let w = 1; w <= 6; w++) {
    const btn = document.createElement('button');
    btn.textContent = w;
    if (w === D.currentWeek) btn.className = 'active';
    btn.addEventListener('click', () => { D.currentWeek = w; save(); renderProgress(); renderHome(); });
    wb.appendChild(btn);
  }
}

/* ================================================================
   WIRE UP
   ================================================================ */
function wireUp() {
  document.querySelectorAll('.tabbar button').forEach(b => {
    b.addEventListener('click', () => {
      const tab = b.dataset.tab;
      if (tab === 'home') { stopSessionTimer(); activeSession = null; showScreen('home'); renderHome(); }
      else if (tab === 'session') {
        if (activeSession) {
          if (viewMode === 'focus') { showScreen('focus'); renderFocus(); }
          else { showScreen('session'); renderSession(); }
        } else {
          // Find first incomplete session this week
          const week = D.currentWeek;
          for (let i = 0; i < PROGRAM.days.length; i++) {
            const s = sid(PROGRAM.days[i].id, week);
            if (!D.logs[s]?.finishedAt) { openSession(i); return; }
          }
          openSession(0);
        }
      }
      else if (tab === 'progress') { showScreen('progress'); renderProgress(); }
    });
  });

  document.getElementById('rt-add').addEventListener('click', () => { if (restState) restState.endTs += 30000; });
  document.getElementById('rt-stop').addEventListener('click', stopRest);

  document.getElementById('smith-bar-weight').addEventListener('change', (e) => {
    D.prefs.smithBarWeight = parseInt(e.target.value); save();
  });

  document.getElementById('btn-export').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify({exportedAt:new Date().toISOString(),logs:D.logs,prefs:D.prefs,currentWeek:D.currentWeek,deloadDismissed:D.deloadDismissed,deloadAccepted:D.deloadAccepted}, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `workout-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
  });
  document.getElementById('btn-import').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.logs) throw new Error('No logs');
        const count = Object.keys(data.logs).length;
        if (!confirm(`Import ${count} session(s)? Merges with existing.`)) return;
        D.logs = Object.assign({}, data.logs, D.logs);
        if (data.prefs) D.prefs = Object.assign(D.prefs, data.prefs);
        save();
        alert(`${count} session(s) imported.`);
        renderProgress(); renderHome();
      } catch(err) { alert('Import failed: ' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('Reset all Block 2 data? Cannot be undone.')) return;
    localStorage.removeItem(LS_KEY);
    location.reload();
  });
}

/* ---- Init ---- */
function init() {
  load();
  wireUp();
  renderHome();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW failed', e));
  }
}

init();
</script>

</html>
